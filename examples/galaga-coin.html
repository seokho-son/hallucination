<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 금융 대전쟁</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root{--bg:#0a0a1a;--gold:#ffd700;--green:#00e676;--red:#ff1744;--blue:#2979ff;--purple:#aa00ff;--cyan:#00e5ff;--white:#eef}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Press Start 2P',monospace;color:var(--white);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;user-select:none}
#app{display:flex;flex-direction:row;align-items:stretch;gap:0;animation:bootUp .6s ease}
@keyframes bootUp{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.game-wrap{position:relative;border:1px solid rgba(255,215,0,0.15);border-radius:8px 0 0 8px;overflow:hidden;box-shadow:0 0 60px rgba(255,215,0,0.05),inset 0 0 40px rgba(0,0,0,0.5);flex-shrink:0}
canvas{display:block}
.side-hud{width:200px;background:rgba(10,10,30,0.97);border:1px solid rgba(255,215,0,0.1);border-left:none;border-radius:0 8px 8px 0;padding:16px 12px;display:flex;flex-direction:column;gap:12px;flex-shrink:0}
.hud-block{background:rgba(255,215,0,0.03);border:1px solid rgba(255,215,0,0.08);border-radius:8px;padding:10px 12px}
.hud-label{color:rgba(255,255,255,0.3);font-size:8px;letter-spacing:1.5px;margin-bottom:5px;text-transform:uppercase}
.hud-val{font-size:18px;color:var(--green);text-shadow:0 0 10px rgba(0,230,118,0.3)}
.hud-val.gold{color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,0.4)}
.hud-val.red{color:var(--red);text-shadow:0 0 10px rgba(255,23,68,0.3)}
.hud-lives{display:flex;gap:4px;margin-top:2px}.hud-lives span{font-size:16px}
.hud-ticker{font-size:7px;line-height:1.7;color:rgba(255,255,255,0.25);border-top:1px solid rgba(255,215,0,0.08);padding-top:8px;margin-top:4px}
.hud-ticker .up{color:#00e676}.hud-ticker .dn{color:#ff1744}
.hud-spacer{flex:1}
.hud-hint{font-size:7px;color:rgba(255,255,255,0.18);line-height:1.8}.hud-hint b{color:rgba(255,255,255,0.3)}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(5,5,20,0.94);backdrop-filter:blur(4px);z-index:10;cursor:pointer}
.overlay.hidden{display:none}
.overlay .title{font-size:32px;background:linear-gradient(135deg,#ffd700,#00e676,#2979ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.overlay .sub{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:20px}
.overlay .prompt{font-size:11px;color:rgba(255,255,255,0.3);animation:blink 1s step-end infinite}
.overlay .emoji{font-size:52px;margin-bottom:10px}
.overlay .sf{font-size:20px;color:var(--gold);text-shadow:0 0 12px rgba(255,215,0,0.5);margin:10px 0}
.overlay .hf{font-size:10px;color:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.touch-controls{display:none;width:100%;padding:8px 16px;gap:8px;flex-direction:row;justify-content:space-between;align-items:center;position:fixed;bottom:0;left:0;right:0;background:rgba(5,5,20,0.9);z-index:50}
.touch-lr{display:flex;gap:8px}
.tbtn{width:68px;height:56px;border:1px solid rgba(255,215,0,0.12);border-radius:10px;background:rgba(255,215,0,0.04);color:rgba(255,255,255,0.4);font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tbtn:active{background:rgba(255,215,0,0.15);border-color:var(--gold)}
.tbtn.fire{width:90px;background:rgba(0,230,118,0.08);border-color:rgba(0,230,118,0.2);color:rgba(0,230,118,0.6);font-size:11px;font-family:inherit}
@media(max-width:1080px){#app{transform:scale(calc(100vw/1080));transform-origin:center center}}
@media(max-height:560px){#app{transform:scale(calc(100vh/560));transform-origin:center center}}
@media(max-width:700px){.side-hud{display:none}.touch-controls{display:flex}#app{flex-direction:column;align-items:center}.game-wrap{border-radius:8px}}
</style>
</head>
<body>
<div id="app">
  <div class="game-wrap" id="game-wrap">
    <canvas id="cv"></canvas>
    <div class="overlay" id="ov-start">
      <div class="emoji">📈💰📉</div>
      <div class="title">금융 대전쟁</div>
      <div class="sub">공매도 세력을 물리치고 자산을 지켜라!</div>
      <div class="prompt">클릭 또는 SPACE로 시작</div>
    </div>
    <div class="overlay hidden" id="ov-over">
      <div class="emoji">💸</div>
      <div class="title" style="font-size:22px">파산!</div>
      <div class="sf" id="final-score"></div>
      <div class="hf" id="final-hi"></div>
      <div class="prompt">클릭 또는 SPACE로 재도전</div>
    </div>
    <div class="overlay hidden" id="ov-stage">
      <div class="emoji" id="stg-emoji">📈</div>
      <div class="title" style="font-size:18px" id="stg-title">시장 1</div>
      <div class="sub" id="stg-sub">개미 투자자의 시작</div>
    </div>
  </div>
  <div class="side-hud">
    <div class="hud-block"><div class="hud-label">자산 (Score)</div><div class="hud-val gold" id="hud-score">$0</div></div>
    <div class="hud-block"><div class="hud-label">최고 수익</div><div class="hud-val" id="hud-hi">$0</div></div>
    <div class="hud-block"><div class="hud-label">시장 (Stage)</div><div class="hud-val red" id="hud-stage">1</div></div>
    <div class="hud-block"><div class="hud-label">포트폴리오</div><div class="hud-lives" id="hud-lives"></div></div>
    <div class="hud-block"><div class="hud-label">무기 레벨</div><div id="hud-wpn" style="font-size:9px;line-height:1.8;color:rgba(255,255,255,0.4)">📈 - 💎 - 🛡️ -</div></div>
    <div class="hud-ticker" id="hud-ticker">
      <div>BTC <span class="up">▲ 68,420</span></div>
      <div>ETH <span class="up">▲ 3,890</span></div>
      <div>KOSPI <span class="dn">▼ 2,612</span></div>
      <div>S&P500 <span class="up">▲ 5,420</span></div>
    </div>
    <div class="hud-spacer"></div>
    <div class="hud-hint"><b>← →</b> 매매<br><b>SPACE</b> 매수 공격<br><b>Z</b> 연타 매매<br><b>M</b> 음소거</div>
  </div>
  <div class="touch-controls">
    <div class="touch-lr"><div class="tbtn" data-act="left">◀</div><div class="tbtn" data-act="right">▶</div></div>
    <div class="tbtn fire" data-act="fire">BUY!</div>
  </div>
</div>
<script>
(function(){
var W=860,H=500,cv=document.getElementById('cv'),ctx=cv.getContext('2d');
cv.width=W;cv.height=H;
var PW=36,PH=30,BSPD=9,MAX_B=5;

// ─── Audio System (Web Audio API) ───
var audioCtx=null,bgmGain=null,sfxGain=null,bgmPlaying=false;
function initAudio(){
  if(audioCtx)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  bgmGain=audioCtx.createGain();bgmGain.gain.value=0.2;bgmGain.connect(audioCtx.destination);
  sfxGain=audioCtx.createGain();sfxGain.gain.value=0.3;sfxGain.connect(audioCtx.destination)}catch(e){audioCtx=null}
}
function playTone(freq,dur,type,vol,dest,detune){
  if(!audioCtx)return;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  if(detune)o.detune.value=detune;
  g.gain.setValueAtTime(Math.min((vol||0.3),0.5),audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(dur||0.1));
  o.connect(g);g.connect(dest||sfxGain);
  o.start();o.stop(audioCtx.currentTime+(dur||0.1)+0.01);
}
function playNoise(dur,vol){
  if(!audioCtx)return;
  var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*(dur||0.03),audioCtx.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  var ns=audioCtx.createBufferSource(),ng=audioCtx.createGain();ns.buffer=buf;
  ng.gain.setValueAtTime(vol||0.05,audioCtx.currentTime);ng.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(dur||0.03));
  ns.connect(ng);ng.connect(sfxGain);ns.start()
}
// ── Sound effects ──
function sfxShoot(){playTone(1100,0.04,'square',0.1);playTone(1400,0.03,'square',0.07)}
function sfxHit(){playTone(180,0.2,'sawtooth',0.3);playTone(120,0.25,'square',0.2);playNoise(0.15,0.12)}
function sfxKill(){playTone(660,0.04,'square',0.15);setTimeout(function(){playTone(880,0.04,'square',0.15)},40);
  setTimeout(function(){playTone(1100,0.06,'triangle',0.12);playNoise(0.05,0.06)},80)}
function sfxPowerup(){
  // Coin collect: ascending sparkle
  var notes=[523,659,784,1047];notes.forEach(function(n,i){
    setTimeout(function(){playTone(n,0.1,'sine',0.2);playTone(n*2,0.06,'triangle',0.08)},i*60)})}
function sfxBossHit(){playTone(280,0.08,'sawtooth',0.18);playTone(220,0.1,'square',0.12);playNoise(0.04,0.08)}
function sfxBossDie(){
  for(var i=0;i<8;i++){(function(i){setTimeout(function(){
    playTone(150+i*80,0.18,'sawtooth',0.2);playTone(80+i*40,0.22,'square',0.15);playNoise(0.1,0.08)
  },i*100)})(i)}
  setTimeout(function(){var v=[523,659,784,1047,1318];v.forEach(function(n,i){setTimeout(function(){playTone(n,0.15,'sine',0.2)},i*80)})},900)}
function sfxDive(){playTone(500,0.06,'sawtooth',0.1);playTone(300,0.15,'sawtooth',0.08)}
function sfxStageClear(){var notes=[523,659,784,1047,1318];notes.forEach(function(n,i){setTimeout(function(){playTone(n,0.15,'sine',0.2);playTone(n/2,0.12,'triangle',0.1)},i*100)})}
function sfxGameOver(){var notes=[440,370,330,262,220];notes.forEach(function(n,i){setTimeout(function(){playTone(n,0.3,'sawtooth',0.18);playTone(n/2,0.35,'square',0.12)},i*220)})}
function sfxLaser(){playTone(90,0.5,'sawtooth',0.12);playTone(70,0.6,'square',0.08);playNoise(0.3,0.06)}
function sfxShield(){playTone(1200,0.06,'sine',0.15);playTone(900,0.08,'triangle',0.12)}
function sfxLevelUp(){
  var notes=[660,880,1100,1320];notes.forEach(function(n,i){
    setTimeout(function(){playTone(n,0.08,'sine',0.18);playTone(n*1.5,0.05,'triangle',0.08)},i*70)})}

// ─── BGM: procedural stock market chiptune ───
var bgmInterval=null,bgmBar=0;
function startBGM(){
  if(!audioCtx||bgmPlaying)return;bgmPlaying=true;
  // Cmaj: C E G  |  Am: A C E  |  F: F A C  |  G: G B D
  var bassLine=[130.81,130.81,110,110, 87.31,87.31,98,98]; // C3 C3 A2 A2 F2 F2 G2 G2
  var chordTones=[
    [261.63,329.63,392],[261.63,329.63,392],
    [220,261.63,329.63],[220,261.63,329.63],
    [174.61,220,261.63],[174.61,220,261.63],
    [196,246.94,293.66],[196,246.94,293.66]];
  var melody=[523,587,659,784, 659,587,523,784, 880,784,659,523, 587,659,784,1047];
  var arpNotes=[261.63,329.63,392,523, 220,261.63,329.63,440, 174.61,220,261.63,349.23, 196,246.94,293.66,392];
  var beatIdx=0,melIdx=0,arpIdx=0;
  var bpm=125,beatMs=60000/bpm/2;
  bgmInterval=setInterval(function(){
    if(!audioCtx||state!=='playing')return;
    var t=audioCtx.currentTime;
    // Bass (every beat)
    var bo=audioCtx.createOscillator(),bg=audioCtx.createGain();
    bo.type='square';bo.frequency.value=bassLine[beatIdx%bassLine.length];
    bg.gain.setValueAtTime(0.07,t);bg.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    bo.connect(bg);bg.connect(bgmGain);bo.start(t);bo.stop(t+0.18);
    // Kick drum (every 2 beats)
    if(beatIdx%2===0){var ko=audioCtx.createOscillator(),kg=audioCtx.createGain();
      ko.type='sine';ko.frequency.setValueAtTime(160,t);ko.frequency.exponentialRampToValueAtTime(30,t+0.1);
      kg.gain.setValueAtTime(0.13,t);kg.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      ko.connect(kg);kg.connect(bgmGain);ko.start(t);ko.stop(t+0.12)}
    // Hi-hat (offbeats)
    if(beatIdx%2===1){var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.025,audioCtx.sampleRate);
      var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
      var ns=audioCtx.createBufferSource(),ng=audioCtx.createGain();ns.buffer=buf;
      ng.gain.setValueAtTime(0.04,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.025);
      ns.connect(ng);ng.connect(bgmGain);ns.start(t)}
    // Chord pad (every 4 beats, sustained)
    if(beatIdx%4===0){var cn=chordTones[Math.floor(beatIdx/4)%chordTones.length];
      cn.forEach(function(f){var co=audioCtx.createOscillator(),cg=audioCtx.createGain();
        co.type='triangle';co.frequency.value=f;
        cg.gain.setValueAtTime(0.025,t);cg.gain.exponentialRampToValueAtTime(0.001,t+0.5);
        co.connect(cg);cg.connect(bgmGain);co.start(t);co.stop(t+0.5)})}
    // Melody (every 4th beat)
    if(beatIdx%4===0){var mo=audioCtx.createOscillator(),mg=audioCtx.createGain();
      mo.type='triangle';mo.frequency.value=melody[melIdx%melody.length];
      mg.gain.setValueAtTime(0.05,t);mg.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      mo.connect(mg);mg.connect(bgmGain);mo.start(t);mo.stop(t+0.22);melIdx++}
    // Arpeggio (every beat, fast note)
    if(beatIdx%1===0){var ao=audioCtx.createOscillator(),ag=audioCtx.createGain();
      ao.type='square';ao.frequency.value=arpNotes[arpIdx%arpNotes.length];
      ag.gain.setValueAtTime(0.02,t);ag.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      ao.connect(ag);ag.connect(bgmGain);ao.start(t);ao.stop(t+0.08);arpIdx++}
    beatIdx++;
  },beatMs);
}
function stopBGM(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null}bgmPlaying=false}
var state='start',score=0,hiScore=0,lives=3,stage=1;
var player,bullets,enemies,eBullets,particles,powerups;
var eDir,eSpd,diveTimer,diveInt,stgTimer,invTimer,shootCD;
var lastTime=0,gT=0,keys={};

// ─── MARKET SYSTEM (chart ↔ gameplay) ─
var chartPts=[];var tickerData=[
  {sym:'BTC',val:68420,chg:1},{sym:'ETH',val:3890,chg:1},{sym:'KOSPI',val:2612,chg:-1},
  {sym:'S&P500',val:5420,chg:1},{sym:'DOGE',val:0.42,chg:1},{sym:'삼전',val:72400,chg:-1}];

// Market state
var market={
  price:1000,         // current "index" price
  startPrice:1000,
  trend:0,            // -1 to 1 (bear to bull)
  momentum:0,         // rate of change
  eventTimer:0,       // countdown to next event
  eventDuration:0,    // active event remaining
  eventType:null,     // 'bull'|'bear'|'crash'|'moon'|null
  eventText:'',
  multiplier:1,       // score multiplier
  speedMod:1,         // enemy speed modifier
  shootMod:1,         // enemy shoot rate modifier
  playerSpeedMod:1,   // player bullet speed modifier
};

var MARKET_EVENTS=[
  {type:'bull', name:'📈 호재 발생!',sub:'연준 금리 인하!',dur:400, priceDelta:0.8,scoreMult:2,speedMod:0.6,shootMod:0.5,playerSpd:1.3},
  {type:'bull', name:'🚀 기관 매수!',sub:'블랙록 비트코인 ETF 승인!',dur:350, priceDelta:1.0,scoreMult:2.5,speedMod:0.5,shootMod:0.4,playerSpd:1.4},
  {type:'bull', name:'💰 대량 매수!',sub:'일론 머스크 트윗!',dur:300, priceDelta:0.6,scoreMult:1.8,speedMod:0.7,shootMod:0.6,playerSpd:1.2},
  {type:'bear', name:'📉 악재 발생!',sub:'금리 인상 발표!',dur:400, priceDelta:-0.8,scoreMult:0.5,speedMod:1.5,shootMod:2,playerSpd:0.8},
  {type:'bear', name:'🏛️ 규제 강화!',sub:'SEC 소송 제기!',dur:350, priceDelta:-0.6,scoreMult:0.6,speedMod:1.4,shootMod:1.8,playerSpd:0.85},
  {type:'bear', name:'💸 투매 발생!',sub:'고래 대량 매도!',dur:300, priceDelta:-0.7,scoreMult:0.5,speedMod:1.6,shootMod:1.5,playerSpd:0.9},
  {type:'crash',name:'💥 시장 대폭락!',sub:'블랙 먼데이!',dur:500, priceDelta:-2.0,scoreMult:0.3,speedMod:2.0,shootMod:3,playerSpd:0.7},
  {type:'moon', name:'🌙 TO THE MOON!',sub:'비트코인 신고가!',dur:500, priceDelta:2.0,scoreMult:3,speedMod:0.4,shootMod:0.3,playerSpd:1.5},
];

function initBg(){chartPts=[];market.price=1000;market.startPrice=1000;market.trend=0;market.momentum=0;market.eventTimer=15000;market.eventDuration=0;market.eventType=null;market.multiplier=1;market.speedMod=1;market.shootMod=1;market.playerSpeedMod=1;market.combo=0;market.comboCooldown=0;market.maxPrice=1000;market.crashCount=0;
  for(var i=0;i<80;i++)chartPts.push(H*.5)}

function marketPump(amount){
  // Called on kills, powerups — pushes price UP
  market.momentum+=amount;
  market.combo++;market.comboCooldown=1500;
  // Combo multiplier: consecutive kills = bigger pumps
  if(market.combo>=3)market.momentum+=amount*.2;
  if(market.combo>=8)market.momentum+=amount*.3;
}
function marketDump(amount){
  // Called on player hit, enemy dive — pushes price DOWN
  market.momentum-=amount;
  market.combo=0;
}

function updateMarket(dt){
  // Combo decay
  market.comboCooldown-=dt;
  if(market.comboCooldown<=0){market.combo=Math.max(0,market.combo-1);market.comboCooldown=800}

  // Momentum naturally decays toward 0 (regression to mean)
  market.momentum*=.985;
  // Small random noise
  market.momentum+=(Math.random()-.5)*.003;
  market.momentum=Math.max(-.2,Math.min(.2,market.momentum));

  // Trend follows momentum
  market.trend+=(market.momentum-market.trend)*.03;
  market.trend=Math.max(-1,Math.min(1,market.trend));

  // Price follows trend directly
  market.price+=market.trend*3+market.momentum*8+(Math.random()-.5)*.5;
  market.price=Math.max(50,market.price);
  if(market.price>market.maxPrice)market.maxPrice=market.price;

  // ── THE KEY: chart position = difficulty & rewards ──
  var bullRatio=Math.max(0,Math.min(1,(market.trend+1)/2)); // 0=full bear, 1=full bull

  // Bull market: player is rewarded
  //   - higher score multiplier
  //   - faster player bullets
  //   - enemies slower & shoot less
  // Bear market: player is punished
  //   - lower score multiplier
  //   - slower player bullets
  //   - enemies faster & shoot more

  // Smooth modifiers (not stepped events)
  market.multiplier=0.5+bullRatio*2.5;      // 0.5x (deep bear) → 3x (full bull)
  market.playerSpeedMod=0.7+bullRatio*0.6;  // 0.7 → 1.3
  market.speedMod=1.6-bullRatio*1.0;        // 1.6 (bear=fast) → 0.6 (bull=slow)
  market.shootMod=2.0-bullRatio*1.5;        // 2.0 (bear) → 0.5 (bull)

  // ── Special threshold events ──
  market.eventTimer-=dt;
  var pctChg=(market.price-market.startPrice)/market.startPrice;

  // Auto-detect crash: price drops >30% from max
  if(market.eventType!=='crash'&&market.price<market.maxPrice*0.7&&market.trend<-.4){
    market.eventType='crash';market.eventDuration=5000;market.crashCount++;
    triggerCP('💥 시장 대폭락! -'+(((market.maxPrice-market.price)/market.maxPrice)*100).toFixed(0)+'%','danger');
    sfxHit();
    // Crash spawns extra enemies
    for(var ce=0;ce<3;ce++){
      var mt=ETYPES[Math.floor(Math.random()*3)];
      var cx=100+Math.random()*(W-200),cy=-30-ce*25;
      enemies.push({x:cx,y:cy,tX:cx,tY:50+Math.random()*60,baseX:cx,baseY:50+Math.random()*60,type:mt,hp:mt.hp||1,alive:true,entering:true,phase:Math.random()*6,diving:false,dAng:0,dSpd:0,hit:0});
    }
  }
  // Auto-detect moon: price rises >50% from start
  if(market.eventType!=='moon'&&pctChg>0.5&&market.trend>.5){
    market.eventType='moon';market.eventDuration=5000;
    triggerCP('🚀 TO THE MOON! +'+((pctChg)*100).toFixed(0)+'%!','streak');
    sfxPowerup();
    // Moon drops bonus powerups
    for(var mp=0;mp<2;mp++){
      var t=['rapid','spread','shield'];
      powerups.push({x:200+Math.random()*(W-400),y:-20-mp*30,vy:.36,type:t[Math.floor(Math.random()*t.length)],life:1200});
    }
  }
  // Recovery from events
  if(market.eventDuration>0){
    market.eventDuration-=dt;
    if(market.eventDuration<=0){
      if(market.eventType==='crash'){market.startPrice=market.price;market.maxPrice=market.price;triggerCP('📊 바닥 확인! 반등 시작?','money')}
      else if(market.eventType==='moon'){market.startPrice=market.price;triggerCP('📊 고점 경신! 조정 올까?','normal')}
      market.eventType=null;
    }
  }

  // Random news events (less frequent, overlays on top)
  if(market.eventTimer<=0&&market.eventDuration<=0){
    market.eventTimer=18000+Math.random()*15000;
    var ev=MARKET_EVENTS[Math.floor(Math.random()*MARKET_EVENTS.length)];
    market.momentum+=ev.priceDelta*.03;
    var cpStyle=ev.priceDelta>0?'money':'danger';
    triggerCP(ev.name+' '+ev.sub,cpStyle);
    if(ev.priceDelta<0)sfxHit();else sfxPowerup();
  }

  // Chart points
  var targetY=H*.5-market.trend*120-market.momentum*150;
  targetY=Math.max(40,Math.min(H-40,targetY));
  chartPts.push(targetY+(Math.random()-.5)*3);
  if(chartPts.length>160)chartPts.shift();

  // Ticker
  for(var i=0;i<tickerData.length;i++){var t=tickerData[i];
    var drift=market.momentum*t.val*.004+(Math.random()-.5)*t.val*.0005;
    t.val+=drift;t.val=Math.max(t.val*.1,t.val);t.chg=drift>0?1:-1}
}

function drawBg(){
  // Sky color shifts with market
  var bearAmt=Math.max(0,-market.trend);var bullAmt=Math.max(0,market.trend);
  var g=ctx.createLinearGradient(0,0,0,H);
  if(market.eventType==='crash'){
    g.addColorStop(0,'#1a0000');g.addColorStop(.5,'#0a0005');g.addColorStop(1,'#150008');
  }else if(market.eventType==='moon'){
    g.addColorStop(0,'#001a0a');g.addColorStop(.5,'#000a15');g.addColorStop(1,'#001508');
  }else{
    var r1=Math.floor(5+bearAmt*15),g1=Math.floor(5+bullAmt*10),b1=Math.floor(15+bullAmt*10);
    g.addColorStop(0,'rgb('+r1+','+g1+','+b1+')');
    g.addColorStop(.5,'rgb('+Math.floor(r1*.8)+','+Math.floor(g1*.8)+','+Math.floor(b1*1.5)+')');
    g.addColorStop(1,'rgb('+Math.floor(r1*.6)+','+Math.floor(g1*.6)+','+Math.floor(b1)+')');
  }
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Grid lines
  ctx.strokeStyle='rgba(255,215,0,0.03)';ctx.lineWidth=1;
  for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  for(var x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  // Main chart line
  if(chartPts.length>1){
    var step=W/(chartPts.length-1);
    // Determine chart color based on recent trend
    var recent=chartPts[chartPts.length-1],prev=chartPts[Math.max(0,chartPts.length-20)];
    var up=recent<prev; // y is inverted
    var lineCol=up?'rgba(0,230,118,':'rgba(255,23,68,';
    // Glow
    ctx.strokeStyle=lineCol+'0.25)';ctx.lineWidth=6;ctx.beginPath();
    for(var i=0;i<chartPts.length;i++){var x=i*step,y=chartPts[i];i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.stroke();
    // Main line
    ctx.strokeStyle=lineCol+'0.5)';ctx.lineWidth=2;ctx.beginPath();
    for(var i=0;i<chartPts.length;i++){var x=i*step,y=chartPts[i];i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.stroke();
    // Fill under
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=lineCol+'0.04)';ctx.fill();
    // Current price indicator
    var curY=chartPts[chartPts.length-1];
    ctx.fillStyle=up?'#00e676':'#ff1744';ctx.beginPath();ctx.arc(W-5,curY,4,0,Math.PI*2);ctx.fill();
    // Price label
    ctx.font='9px "Press Start 2P"';ctx.textAlign='right';ctx.fillStyle=up?'#00e676':'#ff1744';
    ctx.fillText('$'+Math.floor(market.price),W-12,curY-8);
    // Percent change
    var pctChg=((market.price-market.startPrice)/market.startPrice*100);
    ctx.fillText((pctChg>=0?'+':'')+pctChg.toFixed(1)+'%',W-12,curY+14);
    ctx.textAlign='start';
  }
  // Event flash effect
  if(market.eventType==='crash'){
    ctx.fillStyle='rgba(255,0,0,'+(0.03+Math.sin(gT*.005)*.02)+')';ctx.fillRect(0,0,W,H);
  }else if(market.eventType==='moon'){
    ctx.fillStyle='rgba(0,255,100,'+(0.02+Math.sin(gT*.005)*.015)+')';ctx.fillRect(0,0,W,H);
  }
  // Floating symbols
  ctx.fillStyle='rgba(255,215,0,0.03)';ctx.font='28px sans-serif';ctx.textAlign='center';
  var syms=market.eventType==='moon'?['🚀','🌙','💰','📈']:market.eventType==='crash'?['💥','📉','💸','😱']:['$','₿','📊','💰'];
  for(var i=0;i<5;i++){var fx=(gT*.008+i*175)%W,fy=70+Math.sin(gT*.001+i)*50;ctx.fillText(syms[i%syms.length],fx,fy)}
  // Candlesticks
  for(var i=0;i<15;i++){var cx=40+i*55,ch=15+Math.random()*25,isUp=market.trend>-.2?Math.random()>.35:Math.random()>.65;
    ctx.fillStyle=isUp?'rgba(0,230,118,0.06)':'rgba(255,23,68,0.06)';
    ctx.fillRect(cx-4,H-10-ch,8,ch);ctx.fillRect(cx-1,H-10-ch-5,2,5+ch+5)}
  ctx.textAlign='start'}

// ─── Name-tracing path system (butt-writing!) ──
var nameWords=['BTC','ETH','DOGE','코인','주식','떡상','존버','매수','불장','달러','비트','이더','숏','롱','펌프','덤프','금리','호재','가즈아','HODL','MOON','PUMP','SELL','BUY'];
var namePath=[],nameIdx=0,nameT=0,nameSpeed=0.008,nameOffX=0,nameOffY=0,curWord='';

function generateNamePath(word){
  // Convert each character into a series of x,y offsets that trace the shape
  var pts=[];
  // Use a hidden canvas to rasterize the text, then extract path
  var tc=document.createElement('canvas');tc.width=300;tc.height=80;
  var tx=tc.getContext('2d');
  tx.fillStyle='#fff';tx.font='bold 50px sans-serif';tx.textAlign='center';tx.textBaseline='middle';
  tx.fillText(word,150,45);
  var img=tx.getImageData(0,0,300,80);
  // Scan columns left to right, find center of mass per column
  var cols=[];
  for(var cx=0;cx<300;cx+=3){
    var sumY=0,cnt=0;
    for(var cy=0;cy<80;cy++){
      if(img.data[(cy*300+cx)*4+3]>128){sumY+=cy;cnt++}}
    if(cnt>0)cols.push({x:cx,y:sumY/cnt})}
  if(cols.length<2)return[{x:0,y:0},{x:1,y:0}];
  // Normalize to -1..1 range
  var minX=cols[0].x,maxX=cols[cols.length-1].x;
  var minY=999,maxY=0;
  for(var i=0;i<cols.length;i++){if(cols[i].y<minY)minY=cols[i].y;if(cols[i].y>maxY)maxY=cols[i].y}
  var rangeX=maxX-minX||1,rangeY=maxY-minY||1;
  var normalized=[];
  for(var i=0;i<cols.length;i++){
    normalized.push({x:(cols[i].x-minX)/rangeX*2-1, y:(cols[i].y-minY)/rangeY*2-1})}
  return normalized;
}

function pickNewWord(){
  curWord=nameWords[Math.floor(Math.random()*nameWords.length)];
  namePath=generateNamePath(curWord);
  nameIdx=0;nameT=0;
  // Show what they're writing
  particles.push({x:W/2,y:8,vx:0,vy:.1,life:120,maxLife:120,text:'✍️ "'+curWord+'"',color:'rgba(255,215,0,0.4)',size:0,bbl:true});
}

function getNameOffset(){
  if(namePath.length<2)return{x:0,y:0};
  // Interpolate along the path
  var totalLen=namePath.length-1;
  var pos=nameT*totalLen;
  var idx=Math.min(Math.floor(pos),totalLen-1);
  var frac=pos-idx;
  var a=namePath[idx],b=namePath[Math.min(idx+1,totalLen)];
  return{x:a.x+(b.x-a.x)*frac, y:a.y+(b.y-a.y)*frac};
}

  {min:5000,texts:['💵 자산 $5,000 돌파!','📊 첫 수익 실현!']},
  {min:20000,texts:['💰 $20,000! 이제 시작이야!','🏦 통장이 웃고 있다!']},
  {min:50000,texts:['🤑 $50,000!! 큰 손 등극!','💎 다이아몬드 핸드의 결실!']},
  {min:100000,texts:['🐋 $100K!!! 고래가 되었다!','👑 월스트리트를 정복하라!']}
];
var CP_RANDOM=[
  '지금이 매수 타이밍이다!','📈 불장은 의심 속에 자란다!','HODL! 절대 팔지 마!',
  '🌙 To the Moon!','개미가 고래를 이기는 날!','💎🙌 다이아몬드 핸드!',
  '이것이 금융 전쟁이다!','공포에 사고 탐욕에 팔아라!','🚀 로켓 발사 준비!',
  '역사는 존버를 기억한다!','비트코인은 멈추지 않는다!','📊 차트는 거짓말을 안 해!',
  '매수는 기술, 매도는 예술!','하락장? 세일 기간이지!','개미 연합 파이팅!',
  '워런 버핏도 울고 갈 실력!','🏦 연준이 두려워한다!','떡상 직전의 고요함...'
];
var CP_NEARDEATH=['😱 위험해! 마지막 목숨!','💀 계좌 잔고 위험!','🚨 마진콜 임박!','❗ 반등하라! 지금이 아니면 끝이다!'];
var CP_BOSS_ENTER=['⚠️ 거대 세력 출현!','🐋 고래가 온다!','🏦 최종 보스 등장!','😈 시장의 어둠이 깨어난다!'];

// Active catchphrase display
var activeCP=null; // {text, timer, maxTimer, style}

function triggerCP(text,style){
  activeCP={text:text,timer:180,maxTimer:180,style:style||'normal'};
  // Sound: dramatic chord
  if(audioCtx){
    var notes=style==='danger'?[220,277,330]:[440,554,659];
    notes.forEach(function(n,i){setTimeout(function(){playTone(n,.2,'sine',.15);playTone(n/2,.25,'triangle',.08)},i*60)});
  }
}

function checkCatchphrase(dt){
  cpTimeSinceCP+=dt;
  cpStreakTimer-=dt;
  if(cpStreakTimer<=0)cpKillStreak=0;

  // Market trend catchphrases
  if(cpTimeSinceCP>8000&&!activeCP){
    if(market.trend>.6&&Math.random()<.003){
      var bullCPs=['📈 차트가 미쳤다! 떡상!','🐂 황소가 달린다!','💰 개미들이 웃는 날!','🚀 매수세 폭발!','📈 저항선 돌파!'];
      triggerCP(bullCPs[Math.floor(Math.random()*bullCPs.length)],'money');cpTimeSinceCP=0;
    }else if(market.trend<-.6&&Math.random()<.003){
      var bearCPs=['📉 차트 폭락 중!','🐻 곰이 지배한다!','💸 패닉셀 주의!','📉 지지선 붕괴!','😱 공포지수 MAX!'];
      triggerCP(bearCPs[Math.floor(Math.random()*bearCPs.length)],'danger');cpTimeSinceCP=0;
    }else if(market.multiplier>2&&Math.random()<.002){
      triggerCP('💎 x'+market.multiplier.toFixed(1)+' 배율! 지금이 기회!','money');cpTimeSinceCP=0;
    }else if(market.multiplier<0.7&&Math.random()<.002){
      triggerCP('📉 x'+market.multiplier.toFixed(1)+' 배율... 존버하자!','danger');cpTimeSinceCP=0;
    }
  }
  // Combo catchphrases
  if(!activeCP&&market.combo>=5&&cpTimeSinceCP>3000&&Math.random()<.01){
    triggerCP('🔥 '+market.combo+' COMBO! 매수세 폭발!','streak');cpTimeSinceCP=0;
  }
  // Random catchphrase (less frequent now)
  if(cpTimeSinceCP>30000&&!activeCP&&Math.random()<.001){
    triggerCP(CP_RANDOM[Math.floor(Math.random()*CP_RANDOM.length)],'hype');cpTimeSinceCP=0;
  }
}

function onKill(){
  cpKillStreak++;cpStreakTimer=2000;
  for(var i=CP_STREAK.length-1;i>=0;i--){
    if(cpKillStreak===CP_STREAK[i].min){
      var arr=CP_STREAK[i].texts;triggerCP(arr[Math.floor(Math.random()*arr.length)],'streak');cpTimeSinceCP=0;break}}
}
function onScoreChange(){
  for(var i=CP_SCORE.length-1;i>=0;i--){
    if(score>=CP_SCORE[i].min&&cpLastScore<CP_SCORE[i].min){
      var arr=CP_SCORE[i].texts;triggerCP(arr[Math.floor(Math.random()*arr.length)],'money');cpTimeSinceCP=0;break}}
  cpLastScore=score;
}
function onNearDeath(){
  if(lives===1)triggerCP(CP_NEARDEATH[Math.floor(Math.random()*CP_NEARDEATH.length)],'danger');
}
function onBossEnter(){
  triggerCP(CP_BOSS_ENTER[Math.floor(Math.random()*CP_BOSS_ENTER.length)],'boss');
}

function drawCatchphrase(){
  if(!activeCP)return;
  var cp=activeCP;cp.timer--;
  if(cp.timer<=0){activeCP=null;return}
  var progress=1-cp.timer/cp.maxTimer; // 0→1
  var alpha,scale,y;
  // Dramatic entrance: slam in from large, hold, fade out
  if(progress<0.15){
    // Slam in
    var t=progress/0.15;
    scale=3-t*2; // 3→1
    alpha=t;
    y=H*0.38;
  }else if(progress<0.75){
    // Hold with slight pulse
    scale=1+Math.sin(progress*20)*0.03;
    alpha=1;
    y=H*0.38;
  }else{
    // Fade out upward
    var t=(progress-0.75)/0.25;
    scale=1+t*0.3;
    alpha=1-t;
    y=H*0.38-t*30;
  }
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(W/2,y);
  ctx.scale(scale,scale);
  // Background flash
  if(progress<0.1){
    ctx.globalAlpha=alpha*0.15;
    var flashColors={normal:'#ffd700',streak:'#ff4444',money:'#00e676',hype:'#ffd700',danger:'#ff1744',boss:'#aa00ff'};
    ctx.fillStyle=flashColors[cp.style]||'#ffd700';
    ctx.fillRect(-W,-H/2,W*2,H);
    ctx.globalAlpha=alpha;
  }
  // Horizontal lines
  var lineColor={normal:'rgba(255,215,0,0.3)',streak:'rgba(255,68,68,0.4)',money:'rgba(0,230,118,0.3)',hype:'rgba(255,215,0,0.3)',danger:'rgba(255,23,68,0.5)',boss:'rgba(170,0,255,0.4)'};
  ctx.fillStyle=lineColor[cp.style]||'rgba(255,215,0,0.3)';
  ctx.fillRect(-W/2,-18,W,36);
  // Scanlines on the bar
  for(var sl=0;sl<36;sl+=3){ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(-W/2,-18+sl,W,1)}
  // Text
  ctx.font='bold 20px "Press Start 2P"';ctx.textAlign='center';ctx.textBaseline='middle';
  var textColors={normal:'#ffd700',streak:'#ff6666',money:'#69f0ae',hype:'#ffd700',danger:'#ff5252',boss:'#e040fb'};
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillText(cp.text,2,2);
  // Main text
  ctx.fillStyle=textColors[cp.style]||'#ffd700';
  ctx.fillText(cp.text,0,0);
  // Glow
  ctx.globalAlpha=alpha*0.4;
  ctx.fillText(cp.text,0,0);
  ctx.restore();
}


function startGame(){initAudio();score=0;lives=3;stage=1;
  player={x:W/2,y:H-40,speed:6,shield:0,spread:0,rapid:0,rapidLv:0,spreadLv:0,shieldLv:0};
  bullets=[];eBullets=[];particles=[];powerups=[];shootCD=0;invTimer=0;
  megaBoss=null;bossLC=0;bossLF=0;activeCP=null;cpKillStreak=0;cpStreakTimer=0;cpLastScore=0;cpTimeSinceCP=0;
  initBg();spawnEnemies();state='playing';hideOv();updateHUD();startBGM()}
function nextStage(){bullets=[];eBullets=[];powerups=[];megaBoss=null;bossLC=0;bossLF=0;
  player.x=W/2;player.y=H-40;spawnEnemies();state='playing';hideOv();updateHUD()}

// ─── Input ──────────────────────
var muted=false;
document.addEventListener('keydown',function(e){keys[e.code]=true;
  if(e.code==='KeyM'&&audioCtx){muted=!muted;bgmGain.gain.value=muted?0:0.25;sfxGain.gain.value=muted?0:0.35}
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(state==='start'||state==='over')startGame();else if(state==='playing')shoot()}});
document.addEventListener('keyup',function(e){keys[e.code]=false});
document.getElementById('ov-start').addEventListener('click',startGame);
document.getElementById('ov-over').addEventListener('click',startGame);
var ts={};document.querySelectorAll('.tbtn').forEach(function(b){
  function s(e){e.preventDefault();ts[b.dataset.act]=true;if(b.dataset.act==='fire'&&(state==='start'||state==='over'))startGame()}
  function d(e){e.preventDefault();ts[b.dataset.act]=false}
  b.addEventListener('touchstart',s,{passive:false});b.addEventListener('touchend',d,{passive:false});
  b.addEventListener('mousedown',s);b.addEventListener('mouseup',d)});
var tickerCD=0;

// ─── Main loop ──────────────────
function loop(time){
  if(lastTime===0)lastTime=time;var dt=Math.min(time-lastTime,50);lastTime=time;gT=time;
  ctx.clearRect(0,0,W,H);drawBg();
  tickerCD-=dt;if(tickerCD<=0){tickerCD=2000;updateTicker()}
  if(state==='playing'){
    var ml=keys['ArrowLeft']||keys['KeyA']||ts['left'],mr=keys['ArrowRight']||keys['KeyD']||ts['right'];
    if(ml)player.x-=player.speed;if(mr)player.x+=player.speed;
    player.x=Math.max(PW/2,Math.min(W-PW/2,player.x));
    if(keys['Space']||keys['KeyZ']||ts['fire'])shoot();
    if(shootCD>0)shootCD-=dt;if(player.rapid>0)player.rapid-=dt;if(invTimer>0)invTimer-=dt;
    for(var i=bullets.length-1;i>=0;i--){bullets[i].y-=BSPD*market.playerSpeedMod;bullets[i].x+=(bullets[i].vx||0);
      if(bullets[i].y<-10||bullets[i].x<-10||bullets[i].x>W+10){
        if(Math.random()>.85&&bullets[i].y<-5){var mm=MISS_MSGS[Math.floor(Math.random()*MISS_MSGS.length)];
          particles.push({x:bullets[i].x,y:20,vx:0,vy:.15,life:80,maxLife:80,text:mm,color:'#69f0ae',size:0,bbl:true})}
        bullets.splice(i,1)}}
    for(var i=eBullets.length-1;i>=0;i--){eBullets[i].y+=eBullets[i].vy;eBullets[i].x+=(eBullets[i].vx||0);
      if(eBullets[i].y>H+10){if(Math.random()>.85){var ms=['빗나갔다!','다음엔..','치!','운 좋았어!'];
          particles.push({x:eBullets[i].x,y:H-20,vx:0,vy:-.15,life:80,maxLife:80,text:ms[Math.floor(Math.random()*ms.length)],color:'#ff8a80',size:0,bbl:true})}
        eBullets.splice(i,1)}}
    for(var i=powerups.length-1;i>=0;i--){var pw=powerups[i];if(pw.y<H-30)pw.y+=pw.vy;pw.life--;if(pw.life<=0)powerups.splice(i,1)}
    updateEnemies(dt);updateBoss(dt);updateMarket(dt);checkColl();checkBossHit();updateParts();checkCatchphrase(dt);
    for(var i=0;i<powerups.length;i++)drawPow(powerups[i]);
    drawBoss();
    for(var i=0;i<enemies.length;i++){if(enemies[i].alive)drawEnemy(enemies[i])}
    drawBullets();
    var sa=invTimer>0?(Math.sin(gT*.02)>0?1:.2):1;
    ctx.globalAlpha=.06;ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(player.x,player.y,PW,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    drawPlayer(player.x,player.y,sa);
    if(player.shield>0){ctx.strokeStyle='rgba(41,121,255,'+(0.3+Math.sin(gT*.005)*.2)+')';ctx.lineWidth=2;ctx.beginPath();ctx.arc(player.x,player.y,PW*.9,0,Math.PI*2);ctx.stroke();
      ctx.font='8px "Press Start 2P"';ctx.textAlign='center';ctx.fillStyle='rgba(41,121,255,0.6)';ctx.fillText('🛡️x'+player.shield,player.x,player.y+PH+12);ctx.textAlign='start'}
    drawParts();
    drawCatchphrase();
  }else if(state==='stageClear'){
    stgTimer-=dt;
    if(isBoss(stage)){var bd=getBD(stage);document.getElementById('stg-emoji').textContent=bd.emoji;
      document.getElementById('stg-title').textContent='⚠️ 보스 시장 '+stage;document.getElementById('stg-sub').textContent=bd.name+' 출현!!!';}
    else{var names=['개미의 시작','코인 시장','선물 거래소','나스닥 입성','월스트리트','암호화폐 거래소','파생상품 시장','글로벌 증시','다크풀','양자 트레이딩'];
      var emojis=['📊','₿','📈','🗽','🏛️','⛓️','📉','🌍','🕶️','🤖'];
      document.getElementById('stg-emoji').textContent=emojis[Math.min(stage-1,9)];
      document.getElementById('stg-title').textContent='시장 '+stage;document.getElementById('stg-sub').textContent=names[Math.min(stage-1,names.length-1)]}
    showOv('ov-stage');updateParts();drawParts();
    if(stgTimer<=0)nextStage()}
  requestAnimationFrame(loop)}
initBg();requestAnimationFrame(loop);
})();
</script>
