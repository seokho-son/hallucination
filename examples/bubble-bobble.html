<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Bobble</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  #wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  canvas {
    border: 3px solid #333;
    border-radius: 4px;
    image-rendering: pixelated;
    box-shadow: 0 0 40px rgba(93,200,252,0.15);
    display: block;
  }
  #mobile-controls {
    display: none;
    width: 480px;
    justify-content: space-between;
    padding: 8px 4px;
  }
  #mobile-controls button {
    font-size: 20px;
    width: 60px; height: 60px;
    border: 2px solid #555;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    color: #ccc;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
  }
  #mobile-controls button:active { background: rgba(255,255,255,0.25); color: #fff; }
  .dpad { display: flex; gap: 6px; }
  .actions { display: flex; gap: 6px; }
  @media (pointer: coarse) { #mobile-controls { display: flex; } }
  @media (max-width: 520px) { canvas { width: 100vw; height: auto; } #mobile-controls { width: 100vw; } }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="game" width="480" height="416"></canvas>
  <div id="mobile-controls">
    <div class="dpad">
      <button id="btnLeft">◀</button>
      <button id="btnRight">▶</button>
    </div>
    <div class="actions">
      <button id="btnJump">▲</button>
      <button id="btnFire">●</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 416;
const T = 16; // tile size
const COLS = W / T; // 30
const ROWS = H / T; // 26

let state = 'title';
let score = 0, lives = 3, level = 1;
let player, bubbles, enemies, items, particles;
let levelTiles; // 2D array [row][col] = 1 for solid
let levelTimer = 0, clearTimer = 0, gt = 0;
let keys = {};

const C = {
  bg:'#0c0c2c', wall:'#3a6b35', wallL:'#4d8c44', wallD:'#2a4f27',
  player:'#5dfc5d', playerD:'#38b838',
  bubble:'rgba(100,200,255,0.55)', bubbleShine:'rgba(255,255,255,0.7)',
  enemy:['#fc5d5d','#fcac5d','#c85dfc'],
};

function txt(text,x,y,size,color,align) {
  ctx.save(); ctx.fillStyle=color||'#fff'; ctx.font=`bold ${size||14}px monospace`;
  ctx.textAlign=align||'center'; ctx.textBaseline='middle'; ctx.fillText(text,x,y); ctx.restore();
}

// ==========================================
//  LEVEL DESIGN - Bubble Bobble style
//  Each level is a 2D tile grid.
//  Platforms are short with gaps so player
//  can jump through from below.
//  Platform spacing = 4 tiles (64px).
//  Jump reaches ~5 tiles high.
// ==========================================
function buildLevel(n) {
  // Create empty grid
  const g = [];
  for (let r = 0; r < ROWS; r++) {
    g[r] = [];
    for (let c = 0; c < COLS; c++) g[r][c] = 0;
  }

  // Left & right walls (leave gaps at top for wrapping)
  for (let r = 2; r < ROWS; r++) { g[r][0] = 1; g[r][COLS-1] = 1; }

  // Floor
  for (let c = 0; c < COLS; c++) g[ROWS-1][c] = 1;

  // Top ceiling (with gap in middle for falling through from top)
  for (let c = 0; c < COLS; c++) {
    if (c >= 13 && c <= 16) continue; // gap
    g[0][c] = 1;
  }

  // Level-specific platforms
  // Platform rows at rows: 21, 17, 13, 9, 5 (spaced 4 tiles apart)
  // Each platform has gaps so player can jump through
  const layouts = [
    // Level 1 - Simple intro
    [
      { row: 21, segs: [[2,12],[18,28]], gaps: [] },
      { row: 17, segs: [[4,26]], gaps: [[14,16]] },
      { row: 13, segs: [[2,12],[18,28]], gaps: [] },
      { row: 9,  segs: [[6,24]], gaps: [[14,16]] },
    ],
    // Level 2 - Staircase
    [
      { row: 22, segs: [[2,10]], gaps: [] },
      { row: 19, segs: [[8,20]], gaps: [] },
      { row: 16, segs: [[16,28]], gaps: [] },
      { row: 13, segs: [[8,20]], gaps: [] },
      { row: 10, segs: [[2,10]], gaps: [] },
      { row: 7,  segs: [[8,22]], gaps: [[14,16]] },
    ],
    // Level 3 - Symmetry
    [
      { row: 21, segs: [[2,28]], gaps: [[9,11],[19,21]] },
      { row: 17, segs: [[5,25]], gaps: [[14,16]] },
      { row: 13, segs: [[2,28]], gaps: [[9,11],[19,21]] },
      { row: 9,  segs: [[5,25]], gaps: [[14,16]] },
      { row: 5,  segs: [[8,22]], gaps: [] },
    ],
    // Level 4 - Maze-like
    [
      { row: 22, segs: [[2,8],[12,18],[22,28]], gaps: [] },
      { row: 18, segs: [[6,24]], gaps: [[14,16]] },
      { row: 14, segs: [[2,8],[12,18],[22,28]], gaps: [] },
      { row: 10, segs: [[6,24]], gaps: [[14,16]] },
      { row: 6,  segs: [[2,8],[12,18],[22,28]], gaps: [] },
    ],
    // Level 5 - Zigzag
    [
      { row: 21, segs: [[2,14]], gaps: [[7,9]] },
      { row: 17, segs: [[16,28]], gaps: [[21,23]] },
      { row: 13, segs: [[2,14]], gaps: [[7,9]] },
      { row: 9,  segs: [[16,28]], gaps: [[21,23]] },
      { row: 5,  segs: [[6,24]], gaps: [[14,16]] },
    ],
  ];

  const layout = layouts[(n - 1) % layouts.length];
  for (const plat of layout) {
    for (const seg of plat.segs) {
      for (let c = seg[0]; c <= seg[1]; c++) {
        let inGap = false;
        for (const gap of plat.gaps) {
          if (c >= gap[0] && c <= gap[1]) { inGap = true; break; }
        }
        if (!inGap) g[plat.row][c] = 1;
      }
    }
  }

  return g;
}

function spawnEnemiesOnPlatforms(n) {
  const enms = [];
  const count = Math.min(2 + n, 7);
  // Find valid spawn positions (on top of solid tiles)
  const spawns = [];
  for (let r = 2; r < ROWS - 1; r++) {
    for (let c = 2; c < COLS - 2; c++) {
      if (levelTiles[r][c] === 0 && levelTiles[r + 1] && levelTiles[r + 1][c] === 1) {
        // empty space above a solid tile
        spawns.push({ x: c * T + 1, y: r * T - 14 });
      }
    }
  }
  // Shuffle and pick
  for (let i = spawns.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [spawns[i], spawns[j]] = [spawns[j], spawns[i]];
  }
  // Exclude spawns near player start (bottom-left)
  const filtered = spawns.filter(s => !(s.x < 100 && s.y > H - 80));

  for (let i = 0; i < count && i < filtered.length; i++) {
    const s = filtered[i];
    enms.push({
      x: s.x, y: s.y, w: 14, h: 14,
      vx: (Math.random() > 0.5 ? 1 : -1) * (0.6 + n * 0.12),
      vy: 0, color: C.enemy[i % 3], grounded: false,
      trapped: false, trapTimer: 0, alive: true,
      type: i % 3, jt: 60 + Math.random() * 200,
    });
  }
  return enms;
}

function mkPlayer() { return { x: 32, y: H - 48, w: 14, h: 14, vx: 0, vy: 0, dir: 1, grounded: false, scd: 0, inv: 0, af: 0, at: 0 }; }
function mkBubble(x, y, d) { return { x, y, w: 14, h: 14, vx: d * 4, vy: 0, life: 350, phase: 'shoot', st: 14, fvy: -0.4 - Math.random() * 0.2, fvx: (Math.random() - 0.5) * 0.4, trapped: null }; }

function initLevel(n) {
  levelTiles = buildLevel(n);
  enemies = spawnEnemiesOnPlatforms(n);
  bubbles = []; items = []; particles = [];
  player = mkPlayer();
  levelTimer = 0; clearTimer = 0;
  state = 'playing';
}

// ===== TILE COLLISION =====
function tileAt(px, py) {
  const c = Math.floor(px / T), r = Math.floor(py / T);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return 0;
  return levelTiles[r][c];
}

function entityHitsTiles(e, dx, dy) {
  const nx = e.x + dx, ny = e.y + dy;
  // Check all 4 corners + mid points
  const pts = [
    [nx, ny], [nx + e.w - 1, ny],
    [nx, ny + e.h - 1], [nx + e.w - 1, ny + e.h - 1],
    [nx + e.w / 2, ny], [nx + e.w / 2, ny + e.h - 1],
  ];
  for (const [px, py] of pts) {
    if (tileAt(px, py)) return true;
  }
  return false;
}

function moveEntity(e, isPlayer = false) {
  const GRAV = 0.3;
  const MAX_FALL = 5;
  const JUMP_THROUGH = isPlayer; // players can jump through platforms from below

  e.vy = Math.min(e.vy + GRAV, MAX_FALL);

  // Horizontal movement
  if (!entityHitsTiles(e, e.vx, 0)) {
    e.x += e.vx;
  } else {
    const s = Math.sign(e.vx);
    let n = 0;
    while (!entityHitsTiles(e, s, 0) && n < Math.abs(e.vx) + 1) { e.x += s; n++; }
    e.vx = 0;
  }

  // Vertical movement
  e.grounded = false;
  if (e.vy < 0 && JUMP_THROUGH) {
    // Going up: pass through platforms (not walls/floor/ceiling)
    // Only collide with row 0 ceiling and side walls
    const ny = e.y + e.vy;
    // Check if hitting ceiling (row 0)
    const topR = Math.floor(ny / T);
    const leftC = Math.floor(e.x / T);
    const rightC = Math.floor((e.x + e.w - 1) / T);
    let hitCeiling = false;
    if (topR <= 0) {
      for (let c = leftC; c <= rightC; c++) {
        if (c >= 0 && c < COLS && levelTiles[0][c]) { hitCeiling = true; break; }
      }
    }
    if (hitCeiling) {
      // Warp to bottom
      e.y = -e.h;
      e.vy = 0;
    } else {
      e.y += e.vy;
    }
  } else {
    // Going down or not player: normal collision
    if (!entityHitsTiles(e, 0, e.vy)) {
      e.y += e.vy;
    } else {
      const s = Math.sign(e.vy);
      let n = 0;
      while (!entityHitsTiles(e, 0, s) && n < Math.abs(e.vy) + 1) { e.y += s; n++; }
      if (e.vy > 0) e.grounded = true;
      e.vy = 0;
    }
  }

  // Wrap horizontal (through walls)
  if (e.x < -e.w) e.x = W;
  if (e.x > W) e.x = -e.w;
  // Wrap vertical
  if (e.y > H + T) e.y = -e.h - T;
  if (e.y < -e.h - T) e.y = H;
}

// ===== PARTICLES & ITEMS =====
function addP(x, y, c, n) {
  for (let i = 0; i < n; i++) particles.push({
    x, y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4 - 1,
    life: 15 + Math.random() * 15, color: c, size: 2 + Math.random() * 3
  });
}

function spawnItem(x, y, t) {
  const ts = [{ c: '#fc5d5d', p: 200 }, { c: '#fcfc5d', p: 300 }, { c: '#c85dfc', p: 500 }];
  const tt = ts[t % 3];
  items.push({ x, y, w: 12, h: 12, vy: 0, life: 600, color: tt.c, points: tt.p, type: t % 3 });
}

// ===== UPDATE =====
function update() {
  gt++;
  if (state !== 'playing') return;
  levelTimer++;

  // Player input
  const spd = 2.2;
  if (keys['ArrowLeft'] || keys['left']) { player.vx = -spd; player.dir = -1; }
  else if (keys['ArrowRight'] || keys['right']) { player.vx = spd; player.dir = 1; }
  else player.vx *= 0.6; // friction

  // Jump - stronger jump that can reach 4+ tiles
  if ((keys['ArrowUp'] || keys['KeyZ'] || keys['jump']) && player.grounded) {
    player.vy = -6.2;
    player.grounded = false;
  }

  if (player.scd > 0) player.scd--;
  if ((keys['Space'] || keys['KeyX'] || keys['fire']) && player.scd === 0) {
    bubbles.push(mkBubble(player.x + (player.dir > 0 ? 10 : -10), player.y, player.dir));
    player.scd = 14;
  }

  if (player.inv > 0) player.inv--;
  moveEntity(player, true);
  player.at++; if (player.at > 8) { player.at = 0; player.af = (player.af + 1) % 4; }

  // Bubbles
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.life--;
    if (b.life <= 0) { addP(b.x, b.y, 'rgba(100,200,255,0.5)', 4); bubbles.splice(i, 1); continue; }

    if (b.phase === 'shoot') {
      b.x += b.vx;
      b.st--;
      if (b.st <= 0 || entityHitsTiles(b, b.vx, 0)) {
        b.phase = 'float'; b.vx = b.fvx; b.vy = b.fvy;
      }
      if (!b.trapped) {
        for (const e of enemies) {
          if (e.alive && !e.trapped && rh(b, e)) {
            e.trapped = true; e.trapTimer = 500; b.trapped = e;
            b.phase = 'float'; b.vx = b.fvx; b.vy = b.fvy;
            addP(e.x, e.y, e.color, 6);
          }
        }
      }
    } else {
      // Float upward
      b.x += b.vx; b.y += b.vy;
      if (b.x < T) { b.x = T; b.vx = Math.abs(b.vx); }
      if (b.x > W - T - b.w) { b.x = W - T - b.w; b.vx = -Math.abs(b.vx); }
      if (b.y < T * 2) { b.y = T * 2; b.vy = Math.abs(b.vy) * 0.2; }
      if (b.trapped) {
        b.trapped.x = b.x; b.trapped.y = b.y;
        b.trapped.trapTimer--;
        if (b.trapped.trapTimer <= 0) {
          b.trapped.trapped = false; b.trapped = null;
          addP(b.x, b.y, 'rgba(100,200,255,0.5)', 6);
          bubbles.splice(i, 1); continue;
        }
      }
    }

    // Player pops floating bubbles by touching them
    if (b.phase === 'float' && rh(player, b)) {
      if (b.trapped) {
        const e = b.trapped; e.alive = false;
        score += 100 * level;
        spawnItem(e.x, e.y, e.type);
        addP(e.x, e.y, e.color, 10);
      }
      addP(b.x, b.y, 'rgba(100,200,255,0.5)', 4);
      bubbles.splice(i, 1);
    }
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive || e.trapped) continue;
    e.jt--;
    if (e.jt <= 0 && e.grounded) { e.vy = -5; e.jt = 80 + Math.random() * 160; }
    if (Math.random() < 0.015) e.vx = -e.vx;
    if (Math.random() < 0.02) e.vx = player.x > e.x ? Math.abs(e.vx) : -Math.abs(e.vx);
    moveEntity(e, false);
    if (!e.trapped && player.inv === 0 && rh(player, e)) {
      lives--; player.inv = 120; addP(player.x, player.y, C.player, 10);
      if (lives <= 0) state = 'gameover';
    }
  }

  // Items
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.vy = Math.min(it.vy + 0.2, 4);
    if (!entityHitsTiles(it, 0, it.vy)) it.y += it.vy;
    else { const s = Math.sign(it.vy); let n = 0; while (!entityHitsTiles(it, 0, s) && n < 10) { it.y += s; n++; } it.vy = 0; }
    it.life--; if (it.life <= 0) { items.splice(i, 1); continue; }
    if (rh(player, it)) { score += it.points; addP(it.x, it.y, it.color, 6); items.splice(i, 1); }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Level clear
  if (enemies.every(e => !e.alive)) {
    clearTimer++;
    if (clearTimer > 90) { level++; if (level > 10) state = 'win'; else initLevel(level); }
  }
}

function rh(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

// ===== DRAW =====
function draw() {
  ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);
  if (state === 'title') { drawTitle(); return; }

  // Draw tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!levelTiles[r][c]) continue;
      const x = c * T, y = r * T;
      ctx.fillStyle = C.wall; ctx.fillRect(x, y, T, T);
      ctx.fillStyle = C.wallL; ctx.fillRect(x, y, T, 2); ctx.fillRect(x, y, 2, T);
      ctx.fillStyle = C.wallD; ctx.fillRect(x + T - 2, y, 2, T); ctx.fillRect(x, y + T - 2, T, 2);
    }
  }

  // Items
  for (const it of items) {
    ctx.fillStyle = it.color;
    ctx.beginPath(); ctx.arc(it.x + 6, it.y + 6, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    if (it.type === 0) ctx.fillRect(it.x + 5, it.y, 2, 4);
    else if (it.type === 1) { ctx.beginPath(); ctx.arc(it.x + 6, it.y + 6, 3, 0, Math.PI * 2); ctx.fill(); }
    else ctx.fillRect(it.x + 3, it.y + 3, 6, 6);
  }

  // Bubbles
  for (const b of bubbles) {
    if (b.trapped) drawEnemy(b.trapped, true);
    const cx = b.x + 7, cy = b.y + 7;
    ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI * 2);
    ctx.fillStyle = b.trapped ? `rgba(100,200,255,${0.3 + 0.1 * Math.sin(gt * 0.1)})` : C.bubble;
    ctx.fill(); ctx.strokeStyle = 'rgba(150,220,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx - 3, cy - 3, 2.5, 0, Math.PI * 2); ctx.fillStyle = C.bubbleShine; ctx.fill();
  }

  // Enemies
  for (const e of enemies) { if (!e.alive || e.trapped) continue; drawEnemy(e, false); }

  // Player
  if (player.inv === 0 || Math.floor(player.inv / 4) % 2 === 0) drawPlayer();

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 30); ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, 20);
  txt(`SCORE ${score}`, 70, 10, 11, '#5dfc5d', 'left');
  txt(`LEVEL ${level}`, W / 2, 10, 11, '#5dc8fc', 'center');
  txt('♥'.repeat(Math.max(0, lives)), W - 20, 10, 13, '#fc5d5d', 'right');

  if (enemies.every(e => !e.alive) && state === 'playing') txt('LEVEL CLEAR!', W / 2, H / 2, 24, '#5dfc5d');

  if (state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
    txt('GAME OVER', W / 2, H / 2 - 30, 28, '#fc5d5d');
    txt(`SCORE: ${score}`, W / 2, H / 2 + 10, 14, '#fff');
    txt('PRESS ENTER TO RESTART', W / 2, H / 2 + 50, 12, bk());
  }
  if (state === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
    txt('YOU WIN!', W / 2, H / 2 - 30, 28, '#fcfc5d');
    txt(`FINAL SCORE: ${score}`, W / 2, H / 2 + 10, 14, '#5dfc5d');
    txt('PRESS ENTER TO RESTART', W / 2, H / 2 + 50, 12, bk());
  }
}

function bk() { return Math.floor(gt / 30) % 2 === 0 ? '#ccc' : '#555'; }

function drawTitle() {
  // Background bubbles
  for (let i = 0; i < 15; i++) {
    const bx = W / 2 + Math.sin(gt * 0.008 + i * 1.3) * 180;
    const by = H - ((gt * 0.4 + i * 55) % (H + 40));
    const r = 5 + Math.sin(i * 2.1) * 3;
    ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,200,255,${0.12 + 0.05 * Math.sin(gt * 0.03 + i)})`; ctx.fill();
    ctx.beginPath(); ctx.arc(bx - r * 0.3, by - r * 0.3, r * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fill();
  }
  // Preview dragon
  ctx.save(); ctx.translate(W / 2, H / 2 - 115);
  ctx.fillStyle = C.player; ctx.fillRect(-8, -5, 16, 14); ctx.fillRect(-7, -9, 14, 6);
  ctx.fillStyle = '#fff'; ctx.fillRect(2, -7, 5, 5);
  ctx.fillStyle = '#111'; ctx.fillRect(4, -5, 3, 3);
  ctx.fillStyle = C.playerD; ctx.fillRect(-5, 9, 5, 3); ctx.fillRect(3, 9, 5, 3);
  ctx.fillRect(-9, -3, 3, 4); ctx.fillRect(-10, 0, 3, 3);
  ctx.restore();

  txt('BUBBLE BOBBLE', W / 2, H / 2 - 70, 28, '#5dfc5d');
  txt('Classic Arcade', W / 2, H / 2 - 40, 13, '#5dc8fc');
  txt('Arrow Keys: Move', W / 2, H / 2 + 5, 11, '#aaa');
  txt('Up / Z: Jump (through platforms!)', W / 2, H / 2 + 25, 10, '#aaa');
  txt('Space / X: Shoot Bubble', W / 2, H / 2 + 45, 11, '#aaa');
  txt('PRESS ENTER OR CLICK', W / 2, H / 2 + 85, 14, bk());
}

function drawPlayer() {
  const p = player;
  ctx.save(); ctx.translate(p.x + 7, p.y + 7);
  if (p.dir < 0) ctx.scale(-1, 1);
  ctx.fillStyle = C.player; ctx.fillRect(-6, -4, 12, 11); ctx.fillRect(-5, -7, 10, 5);
  ctx.fillStyle = '#fff'; ctx.fillRect(2, -5, 4, 4);
  ctx.fillStyle = '#111'; ctx.fillRect(4, -4, 2, 2);
  ctx.fillStyle = C.playerD;
  if (Math.abs(player.vx) > 0.5) { ctx.fillRect(-4 + (p.af % 2) * 2, 7, 4, 3); ctx.fillRect(2 - (p.af % 2) * 2, 7, 4, 3); }
  else { ctx.fillRect(-4, 7, 4, 2); ctx.fillRect(2, 7, 4, 2); }
  ctx.fillRect(-7, -2, 2, 3); ctx.fillRect(-8, 0, 2, 2);
  ctx.restore();
}

function drawEnemy(e, ib) {
  ctx.save(); ctx.translate(e.x + 7, e.y + 7);
  if (ib) ctx.globalAlpha = 0.7;
  ctx.fillStyle = e.color;
  if (e.type === 0) {
    ctx.fillRect(-6, -5, 12, 12); ctx.fillRect(-5, -7, 10, 3);
    ctx.fillStyle = '#fff'; ctx.fillRect(-4, -4, 3, 3); ctx.fillRect(2, -4, 3, 3);
    ctx.fillStyle = '#111'; ctx.fillRect(-3, -3, 2, 2); ctx.fillRect(3, -3, 2, 2);
    ctx.fillStyle = e.color; ctx.fillRect(-5, 7, 3, 2); ctx.fillRect(3, 7, 3, 2);
  } else if (e.type === 1) {
    ctx.fillRect(-5, -6, 10, 13); ctx.fillRect(-7, -3, 14, 6);
    ctx.fillStyle = '#fff'; ctx.fillRect(-3, -4, 3, 4); ctx.fillRect(1, -4, 3, 4);
    ctx.fillStyle = '#111'; ctx.fillRect(-2, -2, 2, 2); ctx.fillRect(2, -2, 2, 2);
    ctx.fillStyle = e.color; ctx.fillRect(-4, 7, 3, 2); ctx.fillRect(2, 7, 3, 2);
  } else {
    ctx.fillRect(-5, -4, 10, 11); ctx.fillRect(-7, -7, 3, 5); ctx.fillRect(5, -7, 3, 5);
    ctx.fillStyle = '#fff'; ctx.fillRect(-3, -2, 3, 3); ctx.fillRect(1, -2, 3, 3);
    ctx.fillStyle = '#111'; ctx.fillRect(-2, -1, 2, 2); ctx.fillRect(2, -1, 2, 2); ctx.fillRect(-2, 4, 5, 2);
  }
  ctx.globalAlpha = 1; ctx.restore();
}

// ===== INPUT =====
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Enter') {
    if (state === 'title') { score = 0; lives = 3; level = 1; initLevel(level); }
    else if (state === 'gameover' || state === 'win') { score = 0; lives = 3; level = 1; state = 'title'; }
  }
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function sBtn(id, key) {
  const b = document.getElementById(id); if (!b) return;
  b.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; }, { passive: false });
  b.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; }, { passive: false });
  b.addEventListener('mousedown', () => keys[key] = true);
  b.addEventListener('mouseup', () => keys[key] = false);
  b.addEventListener('mouseleave', () => keys[key] = false);
}
sBtn('btnLeft', 'left'); sBtn('btnRight', 'right'); sBtn('btnJump', 'jump'); sBtn('btnFire', 'fire');

canvas.addEventListener('click', () => {
  if (state === 'title') { score = 0; lives = 3; level = 1; initLevel(level); }
  else if (state === 'gameover' || state === 'win') { score = 0; lives = 3; level = 1; state = 'title'; }
});

// ===== LOOP =====
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
