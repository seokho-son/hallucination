<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>₿ 비트코인 채굴기 — 지뢰찾기 에디션</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --cell-bg: #1a1f2e;
    --cell-hover: #252d40;
    --cell-revealed: #0a0e16;
    --border-hi: #2a3450;
    --border-lo: #080b12;
    --btc: #f7931a;
    --btc-glow: rgba(247, 147, 26, 0.3);
    --green: #00e676;
    --red: #ff3b5c;
    --text: #e0e0e8;
    --text-dim: #5a6480;
    --mine-bg: #ff3b5c18;
    --gold: #ffd54f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    overflow-y: auto;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(247,147,26,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,230,118,0.02) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 49px, #ffffff02 49px, #ffffff02 50px),
      repeating-linear-gradient(90deg, transparent, transparent 49px, #ffffff02 49px, #ffffff02 50px);
    pointer-events: none;
    z-index: 0;
  }

  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 100;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 16px 10px 24px;
    max-width: 100%;
  }

  .title-area { text-align: center; }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--btc);
    text-shadow: 0 0 30px var(--btc-glow);
  }

  h1 .btc-icon { font-size: 28px; vertical-align: middle; margin-right: 4px; }

  .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    font-style: italic;
  }

  /* Price ticker */
  .ticker {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #0a0e16;
    border: 1px solid #1a2030;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    width: 100%;
    max-width: 500px;
    justify-content: space-between;
    flex-wrap: wrap;
  }

  .ticker-item { display: flex; align-items: center; gap: 4px; }
  .ticker-label { color: var(--text-dim); font-size: 10px; }
  .ticker-val { font-weight: 700; }
  .ticker-val.up { color: var(--green); }
  .ticker-val.down { color: var(--red); }
  .ticker-val.btc-color { color: var(--btc); }

  .mini-chart {
    width: 80px;
    height: 28px;
    position: relative;
  }

  .mini-chart canvas { width: 100%; height: 100%; }

  .commentary {
    font-size: 13px;
    color: var(--btc);
    text-align: center;
    min-height: 20px;
    padding: 8px 18px;
    background: rgba(247, 147, 26, 0.04);
    border: 1px solid rgba(247, 147, 26, 0.1);
    border-radius: 6px;
    max-width: 480px;
    transition: all 0.3s;
    line-height: 1.6;
  }

  .commentary.danger-comment {
    color: var(--red);
    background: rgba(255, 59, 92, 0.04);
    border-color: rgba(255, 59, 92, 0.12);
  }

  .commentary.safe-comment {
    color: var(--green);
    background: rgba(0, 230, 118, 0.04);
    border-color: rgba(0, 230, 118, 0.12);
  }

  .difficulty-bar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }

  .diff-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid #1a2030;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .diff-btn:hover { color: var(--text); border-color: var(--btc); }

  .diff-btn.active {
    color: var(--btc);
    border-color: var(--btc);
    background: rgba(247, 147, 26, 0.06);
    box-shadow: 0 0 12px rgba(247, 147, 26, 0.08);
  }

  .diff-desc { font-size: 10px; color: var(--text-dim); font-style: italic; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 10px 16px;
    background: #0a0e16;
    border: 1px solid #1a2030;
    border-radius: 6px;
  }

  .counter {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    min-width: 90px;
    text-align: center;
    padding: 4px 10px;
    background: #000;
    border: 1px solid #1a1a22;
    border-radius: 4px;
  }

  .counter.mine-count { color: var(--red); text-shadow: 0 0 8px rgba(255, 59, 92, 0.4); }
  .counter.mine-count::before { content: '⚠ '; font-size: 14px; }

  .counter.wallet {
    color: var(--btc);
    text-shadow: 0 0 8px var(--btc-glow);
    font-size: 16px;
  }
  .counter.wallet::before { content: '₿ '; }

  .face-btn {
    width: 48px;
    height: 48px;
    background: var(--cell-bg);
    border: 2px solid var(--border-hi);
    border-radius: 8px;
    font-size: 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    user-select: none;
    position: relative;
  }

  .face-btn:hover { background: var(--cell-hover); transform: scale(1.1); }
  .face-btn:active { transform: scale(0.95); }

  .face-btn .face-tooltip {
    position: absolute;
    bottom: -26px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: var(--text-dim);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .face-btn:hover .face-tooltip { opacity: 1; }

  .board-wrapper {
    padding: 6px;
    background: #0a0e16;
    border: 1px solid #1a2030;
    border-radius: 8px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.02);
  }

  .board { display: grid; gap: 2px; }

  .cell {
    width: 34px;
    height: 34px;
    background: var(--cell-bg);
    border: 1px solid var(--border-hi);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 14px;
    user-select: none;
    transition: background 0.1s, transform 0.1s, border-color 0.1s;
    position: relative;
  }

  .cell:hover:not(.revealed):not(.flagged-cell) {
    background: var(--cell-hover);
    border-color: var(--btc);
    transform: scale(1.05);
    z-index: 2;
  }

  .cell.revealed {
    background: var(--cell-revealed);
    border-color: var(--border-lo);
    cursor: default;
    transform: none;
  }

  .cell.revealed.mine-cell {
    background: var(--mine-bg);
    border-color: rgba(255, 59, 92, 0.25);
  }

  .cell.mine-hit {
    background: rgba(255, 59, 92, 0.3) !important;
    border-color: var(--red) !important;
    animation: explode 0.5s ease-out;
  }

  .cell.flagged-cell {
    background: rgba(247, 147, 26, 0.06);
    border-color: rgba(247, 147, 26, 0.25);
  }

  .cell.flagged-cell:hover {
    background: rgba(247, 147, 26, 0.12);
    border-color: var(--btc);
    transform: scale(1.05);
    z-index: 2;
  }

  @keyframes explode {
    0% { transform: scale(1); }
    20% { transform: scale(1.4) rotate(5deg); }
    40% { transform: scale(0.9) rotate(-3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  @keyframes cell-reveal {
    0% { transform: scale(0.7); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }

  .cell.just-revealed { animation: cell-reveal 0.15s ease-out; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 50%, 90% { transform: translateX(-4px); }
    30%, 70% { transform: translateX(4px); }
  }

  .shake { animation: shake 0.5s ease-in-out; }

  .n1 { color: #4fc3f7; }
  .n2 { color: #66bb6a; }
  .n3 { color: #f7931a; }
  .n4 { color: #ab47bc; }
  .n5 { color: #ef5350; }
  .n6 { color: #26a69a; }
  .n7 { color: #8d6e63; }
  .n8 { color: #bdbdbd; }

  .stats-row {
    display: flex;
    gap: 14px;
    font-size: 10px;
    color: var(--text-dim);
    flex-wrap: wrap;
    justify-content: center;
  }

  .stats-row span { display: flex; align-items: center; gap: 3px; }
  .stats-row .val { color: var(--btc); font-family: 'Orbitron', sans-serif; font-weight: 700; }

  /* Floating satoshi popup */
  .sat-popup {
    position: fixed;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--btc);
    text-shadow: 0 0 10px var(--btc-glow);
    pointer-events: none;
    z-index: 90;
    animation: float-up 1.2s ease-out forwards;
  }

  .sat-popup.loss {
    color: var(--red);
    text-shadow: 0 0 10px rgba(255, 59, 92, 0.5);
  }

  @keyframes float-up {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    60% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-60px) scale(0.7); }
  }

  /* Halving flash */
  @keyframes halving-flash {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 40px var(--btc-glow), inset 0 0 20px rgba(247,147,26,0.05); }
  }

  .halving-flash { animation: halving-flash 0.6s ease-in-out 2; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg);
    border: 1px solid #1a2030;
    border-radius: 14px;
    padding: 36px 44px;
    text-align: center;
    transform: translateY(20px) scale(0.95);
    transition: transform 0.3s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    max-width: 420px;
  }

  .overlay.show .modal { transform: translateY(0) scale(1); }

  .modal-emoji { font-size: 56px; margin-bottom: 12px; display: block; }

  .modal h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    margin-bottom: 8px;
    letter-spacing: 3px;
  }

  .modal .modal-sub {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 6px;
    line-height: 1.6;
  }

  .modal .modal-joke {
    color: var(--btc);
    font-size: 12px;
    font-style: italic;
    margin-bottom: 6px;
    line-height: 1.5;
  }

  .modal .modal-profit {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 18px;
    padding: 8px 16px;
    border-radius: 6px;
  }

  .modal .modal-profit.profit {
    color: var(--green);
    background: rgba(0, 230, 118, 0.06);
    border: 1px solid rgba(0, 230, 118, 0.15);
  }

  .modal .modal-profit.loss {
    color: var(--red);
    background: rgba(255, 59, 92, 0.06);
    border: 1px solid rgba(255, 59, 92, 0.15);
  }

  .modal button {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 28px;
    border: 1px solid var(--btc);
    background: rgba(247, 147, 26, 0.08);
    color: var(--btc);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal button:hover {
    background: rgba(247, 147, 26, 0.18);
    box-shadow: 0 0 20px rgba(247, 147, 26, 0.12);
  }

  .win h2 { color: var(--green); }
  .lose h2 { color: var(--red); }

  .instructions {
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.5px;
  }

  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
    overflow: hidden;
  }

  .confetti {
    position: absolute;
    animation: confetti-drop linear forwards;
  }

  @keyframes confetti-drop {
    0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(100vh) rotate(1080deg) scale(0.3); opacity: 0; }
  }

  .halving-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--btc);
    text-shadow: 0 0 30px var(--btc-glow);
    z-index: 90;
    pointer-events: none;
    white-space: nowrap;
    animation: halving-pop 1.5s ease-out forwards;
  }

  @keyframes halving-pop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    15% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    30% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
  }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="confetti-container" id="confettiContainer"></div>

<div class="container">
  <div class="title-area">
    <h1><span class="btc-icon">₿</span> 비트코인 채굴기</h1>
    <div class="subtitle" id="subtitle">블록을 채굴하고, 러그풀을 피하라</div>
  </div>

  <!-- Price Ticker -->
  <div class="ticker">
    <div class="ticker-item">
      <span class="ticker-label">BTC</span>
      <span class="ticker-val btc-color" id="tickerPrice">$0</span>
    </div>
    <div class="ticker-item">
      <span class="ticker-label">수익</span>
      <span class="ticker-val up" id="tickerProfit">+0 sat</span>
    </div>
    <div class="ticker-item">
      <span class="ticker-label">블록</span>
      <span class="ticker-val btc-color" id="tickerBlock">#0</span>
    </div>
    <div class="ticker-item">
      <span class="ticker-label">해시레이트</span>
      <span class="ticker-val btc-color" id="tickerHash">0 H/s</span>
    </div>
    <div class="mini-chart"><canvas id="chartCanvas"></canvas></div>
  </div>

  <div class="commentary" id="commentary">⛏️ 채굴 장비 가동 중... 첫 블록을 채굴하세요!</div>

  <div class="difficulty-bar">
    <button class="diff-btn active" data-level="easy">🐣 개인 채굴</button>
    <button class="diff-btn" data-level="medium">⛏️ 채굴 풀</button>
    <button class="diff-btn" data-level="hard">🏭 채굴 농장</button>
  </div>

  <div class="diff-desc" id="diffDesc">9×9 블록체인 · 러그풀 10개 · "GPU 1개면 충분해~"</div>

  <div class="top-bar">
    <div class="counter mine-count" id="mineCounter">010</div>
    <button class="face-btn" id="faceBtn">
      🤑
      <span class="face-tooltip">리셋 (손절 아님)</span>
    </button>
    <div class="counter wallet" id="walletDisplay">0</div>
  </div>

  <div class="board-wrapper" id="boardWrapper">
    <div class="board" id="board"></div>
  </div>

  <div class="stats-row">
    <span>연승: <span class="val" id="winStreak">0</span></span>
    <span>파산: <span class="val" id="totalDeaths">0</span></span>
    <span>블록 채굴: <span class="val" id="clickCount">0</span></span>
    <span>총 수익: <span class="val" id="totalSats">0</span> sat</span>
  </div>

  <div class="instructions">좌클릭 = 블록 채굴 · 우클릭 = 러그풀 의심 표시 (DYOR)</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <span class="modal-emoji" id="modalEmoji"></span>
    <h2 id="modalTitle"></h2>
    <p class="modal-sub" id="modalText"></p>
    <p class="modal-joke" id="modalJoke"></p>
    <div class="modal-profit" id="modalProfit"></div>
    <button id="modalBtn">다시 채굴</button>
  </div>
</div>

<script>
const LEVELS = {
  easy:   { rows: 9,  cols: 9,  mines: 10, satBase: 100 },
  medium: { rows: 16, cols: 16, mines: 40, satBase: 250 },
  hard:   { rows: 16, cols: 30, mines: 99, satBase: 1000 },

];

const SAFE_COMMENTS = [
  '블록 검증 완료! 보상이 들어옵니다 💰',

];

const BIG_REVEAL = [
  '⛏️ 메가 블록 발견! 보상이 비처럼 쏟아집니다!',
  '대규모 채굴 성공! 이건 마치 2017년 불장 같은 느낌!',
  '블록 대량 생산! 채굴 풀에서 파티가 벌어지고 있습니다!',
  '콰앙! 블록이 도미노처럼! 비트코인 ATH 갱신 느낌!',
  'Hash Boom! 한 번에 여러 블록을 캐셨습니다!',
];

const DANGER_COMMENTS = [

function simulatePrice() {
  if (priceHistory.length === 0) btcPrice = 40000 + Math.floor(Math.random() * 60000);
  const change = (Math.random() - 0.45) * 2000;
  btcPrice = Math.max(10000, Math.floor(btcPrice + change));
  priceHistory.push(btcPrice);
  if (priceHistory.length > 30) priceHistory.shift();
  drawChart();
}

function drawChart() {
  const w = chartCanvas.width = 80 * 2;
  const h = chartCanvas.height = 28 * 2;
  ctx.clearRect(0, 0, w, h);
  if (priceHistory.length < 2) return;

  const min = Math.min(...priceHistory);
  const max = Math.max(...priceHistory);
  const range = max - min || 1;

  const isUp = priceHistory[priceHistory.length - 1] >= priceHistory[0];
  const color = isUp ? '#00e676' : '#ff3b5c';

  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  priceHistory.forEach((p, i) => {
    const x = (i / (priceHistory.length - 1)) * w;
    const y = h - ((p - min) / range) * (h - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Fill gradient
  const lastX = w;
  const lastY = h - ((priceHistory[priceHistory.length - 1] - min) / range) * (h - 4) - 2;
  ctx.lineTo(lastX, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, isUp ? 'rgba(0,230,118,0.15)' : 'rgba(255,59,92,0.15)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fill();
}

function getRevealedCount() {
  let c = 0;
  for (let r = 0; r < rows; r++)
    for (let col = 0; col < cols; col++)
      if (revealed[r][col]) c++;
  return c;
}

function init() {
  const cfg = LEVELS[level];
  rows = cfg.rows; cols = cfg.cols; totalMines = cfg.mines; satBase = cfg.satBase;
  grid = Array.from({ length: rows }, () => Array(cols).fill(0));
  revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
  flagged = Array.from({ length: rows }, () => Array(cols).fill(false));
  mineLocations = new Set();
  gameOver = false; gameWon = false; firstClick = true;
  flagCount = 0; clicks = 0; satoshis = 0;
  safeReveals = 0; halvingCount = 0;
  currentReward = satBase;
  timerVal = 0;
  clearInterval(timerInterval);

  priceHistory = [];
  for (let i = 0; i < 10; i++) simulatePrice();

  updateMineCounter();
  updateWallet();
  updateStats();
  updateTicker();
  faceBtn.innerHTML = '🤑<span class="face-tooltip">리셋 (손절 아님)</span>';
  overlay.classList.remove('show');
  modal.classList.remove('win', 'lose');
  subtitle.textContent = pick(SUBTITLES);
  setCommentary('⛏️ 채굴 장비 가동 중... 첫 블록을 채굴하세요!');
  renderBoard();
}

function placeMines(safeR, safeC) {
  const safe = new Set();
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++)
      safe.add(`${safeR + dr},${safeC + dc}`);

  while (mineLocations.size < totalMines) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    const key = `${r},${c}`;
    if (!safe.has(key) && !mineLocations.has(key)) {
      mineLocations.add(key);
      grid[r][c] = -1;
    }
  }
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (grid[r][c] !== -1) grid[r][c] = countAdjacentMines(r, c);
}

function countAdjacentMines(r, c) {
  let count = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === -1) count++;
    }
  return count;
}

function renderBoard() {
  board.style.gridTemplateColumns = `repeat(${cols}, 34px)`;
  board.innerHTML = '';
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.addEventListener('click', (e) => handleClick(r, c, e));
      cell.addEventListener('contextmenu', e => { e.preventDefault(); handleFlag(r, c); });
      cell.addEventListener('mousedown', () => {
        if (!gameOver) faceBtn.innerHTML = '😰<span class="face-tooltip">러그풀 아니길...</span>';
      });
      cell.addEventListener('mouseup', () => {
        if (!gameOver && !gameWon) faceBtn.innerHTML = '🤑<span class="face-tooltip">리셋 (손절 아님)</span>';
      });
      board.appendChild(cell);
    }
}

function getCell(r, c) { return board.children[r * cols + c]; }

function handleClick(r, c, event) {
  if (gameOver || flagged[r][c] || revealed[r][c]) return;

  clicks++;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    startTimer();
  }

  if (grid[r][c] === -1) {
    revealMine(r, c);
    return;
  }

  const before = getRevealedCount();
  flood(r, c);
  const after = getRevealedCount();
  const justRevealed = after - before;

  // Earn satoshis
  const earned = justRevealed * currentReward;
  satoshis += earned;
  totalSatoshis += earned;
  safeReveals += justRevealed;

  // Floating popup
  if (event) spawnSatPopup(event.clientX, event.clientY - 20, earned, false);

  // Halving check
  const newHalvingCount = Math.floor(safeReveals / HALVING_INTERVAL);
  if (newHalvingCount > halvingCount && currentReward > 1) {
    showHalvingBanner();
    currentReward = Math.max(1, Math.floor(currentReward / 2));
    halvingCount = newHalvingCount;
  }

  // Price simulation
  simulatePrice();
  if (justRevealed > 5) { btcPrice += Math.floor(Math.random() * 3000); priceHistory.push(btcPrice); }

  // Commentary
  if (clicks === 1) setCommentary(pick(FIRST_CLICK), 'safe');
  else if (justRevealed > 8) setCommentary(pick(BIG_REVEAL), 'safe');
  else if (grid[r][c] >= 4) setCommentary(pick(DANGER_COMMENTS), 'danger');
  else if (Math.random() < 0.35) setCommentary(pick(SAFE_COMMENTS));

  updateWallet();
  updateStats();
  updateTicker();
  checkWin();
}

function handleFlag(r, c) {
  if (gameOver || revealed[r][c] || firstClick) return;

  const cell = getCell(r, c);
  if (flagged[r][c]) {
    flagged[r][c] = false;
    flagCount--;
    cell.textContent = '';
    cell.classList.remove('flagged-cell');
    if (Math.random() < 0.5) setCommentary(pick(UNFLAG_COMMENTS));
  } else {
    flagged[r][c] = true;
    flagCount++;
    cell.textContent = '🚩';
    cell.classList.add('flagged-cell');
    if (Math.random() < 0.5) setCommentary(pick(FLAG_COMMENTS));
  }
  updateMineCounter();
}

function flood(r, c) {
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (revealed[r][c] || flagged[r][c]) return;

  revealed[r][c] = true;
  const cell = getCell(r, c);
  cell.classList.add('revealed', 'just-revealed');

  const val = grid[r][c];
  if (val > 0) {
    cell.textContent = val;
    cell.classList.add(`n${val}`);
  } else if (val === 0) {
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        if (dr !== 0 || dc !== 0) flood(r + dr, c + dc);
  }
}

function revealMine(hitR, hitC) {
  gameOver = true;
  totalDeaths++;
  winStreak = 0;

  // Lose satoshis
  const lost = Math.floor(satoshis * 0.8);
  satoshis = satoshis - lost;
  totalSatoshis = Math.max(0, totalSatoshis - lost);

  // Price crash
  btcPrice = Math.max(5000, Math.floor(btcPrice * 0.4));
  for (let i = 0; i < 5; i++) { priceHistory.push(btcPrice - Math.floor(Math.random() * 2000)); }
  drawChart();

  clearInterval(timerInterval);
  faceBtn.innerHTML = '💀<span class="face-tooltip">...지갑이 텅 빈 날</span>';

  document.getElementById('boardWrapper').classList.add('shake');
  setTimeout(() => document.getElementById('boardWrapper').classList.remove('shake'), 500);

  const hitCell = getCell(hitR, hitC);
  hitCell.classList.add('revealed', 'mine-hit');
  hitCell.textContent = '💥';

  if (event) spawnSatPopup(event.clientX, event.clientY - 20, -lost, true);

  setCommentary('📉 러그풀!! 시장이 붕괴했습니다... PANIC SELL!', 'danger');

  let delay = 80;
  const scamEmojis = ['💣', '🔻', '📉', '💸', '🏴‍☠️'];
  mineLocations.forEach(key => {
    const [r, c] = key.split(',').map(Number);
    if (r === hitR && c === hitC) return;
    setTimeout(() => {
      const cell = getCell(r, c);
      if (!flagged[r][c]) {
        cell.classList.add('revealed', 'mine-cell', 'just-revealed');
        cell.textContent = pick(scamEmojis);
      }
    }, delay);
    delay += 25;
  });

  setTimeout(() => {
    updateWallet();
    updateStats();
    updateTicker();
    showDeathModal(lost);
  }, delay + 400);
}

function checkWin() {
  let unrevealed = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!revealed[r][c]) unrevealed++;

  if (unrevealed === totalMines) {
    gameOver = true;
    gameWon = true;
    winStreak++;
    clearInterval(timerInterval);
    faceBtn.innerHTML = '😎<span class="face-tooltip">고래가 되셨습니다!</span>';

    // Bonus satoshis for winning
    const bonus = satBase * 10;
    satoshis += bonus;
    totalSatoshis += bonus;

    // Price pump
    btcPrice = Math.floor(btcPrice * 1.5);
    for (let i = 0; i < 5; i++) { priceHistory.push(btcPrice + Math.floor(Math.random() * 5000)); }
    drawChart();

    mineLocations.forEach(key => {
      const [r, c] = key.split(',').map(Number);
      if (!flagged[r][c]) {
        flagged[r][c] = true;
        flagCount++;
        getCell(r, c).textContent = '🚩';
        getCell(r, c).classList.add('flagged-cell');
      }
    });

    updateMineCounter();
    updateWallet();
    updateStats();
    updateTicker();
    spawnConfetti();
    setCommentary('🚀 TO THE MOON! 모든 블록 채굴 완료! ATH 갱신!', 'safe');
    setTimeout(() => showWinModal(bonus), 800);
  }
}

function startTimer() {
  timerVal = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (timerVal < 999) {
      timerVal++;
      simulatePrice();
      updateTicker();
      if (timerVal === 30) setCommentary('30초... 아직 전기세 감당 가능합니다.');
      if (timerVal === 60) setCommentary('1분 경과... GPU가 비명을 지르고 있습니다 🔥');
      if (timerVal === 120) setCommentary('2분째 채굴 중... 이웃이 전기 도둑 아니냐고 물어봅니다.');
      if (timerVal === 180) setCommentary('3분! 이 정도면 비트코인 반감기를 두 번 겪은 기분.', 'danger');
      if (timerVal === 300) setCommentary('5분... 채굴장 에어컨비가 수익을 넘었습니다.', 'danger');
    }
  }, 1000);
}

// Difficulty
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.diff-btn.active').classList.remove('active');
    btn.classList.add('active');
    level = btn.dataset.level;
    diffDesc.textContent = LEVEL_DESC[level];
    init();
  });
});

faceBtn.addEventListener('click', init);
modalBtn.addEventListener('click', () => { overlay.classList.remove('show'); setTimeout(init, 200); });
board.addEventListener('contextmenu', e => e.preventDefault());

init();
</script>
